name: surveyor_pro
description: A professional offline-first road survey app for civil engineers.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  path: ^1.9.0
  sqflite: ^2.3.3+1
  share_plus: ^10.0.2
  image: ^4.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/surveyor_mark_light.png
    - assets/branding/surveyor_mark_dark.png
    - assets/branding/surveyor_wordmark_light.png
    - assets/branding/surveyor_wordmark_dark.png
